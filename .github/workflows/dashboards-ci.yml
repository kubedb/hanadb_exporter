name: Dashboards CI

# this workflow will
# - check for JSON syntax errors on every pull request
# - commit to the OBS development upstream whenever the main branch is updated

on:
  push:
    branches:
    - main
    paths:
    - 'Makefile'
    - 'dashboards/**'
    - 'packaging/obs/grafana-sap-hana-dashboards/**'
    - '.github/workflows/dashboards*'
  pull_request:
    branches:
    - main
    paths:
    - 'Makefile'
    - 'dashboards/**'
    - 'packaging/obs/grafana-sap-hana-dashboards/**'
    - '.github/workflows/dashboards*'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}-ci
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install --global jsonlint
    - name: validate JSON
      run: find dashboards -name "*.json" -type f -exec jsonlint -c {} \;

  obs-commit:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    container: shap/continuous_deliver
    env:
      OBS_USER: ${{ secrets.OBS_USER }}
      OBS_PASS: ${{ secrets.OBS_PASS }}
      OBS_PROJECT: ${{ vars.OBS_PROJECT }}
      REVISION: ${{ github.sha }}
      REPOSITORY: ${{ github.repository }}
      GITHUB_OAUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: configure OSC
      run: |
        /scripts/init_osc_creds.sh
        mkdir -p $HOME/.config/osc
        cp /root/.config/osc/oscrc $HOME/.config/osc
    - run: make dashboards-obs-commit
