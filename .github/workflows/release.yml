name: Build and Publish artifacts

on:
  workflow_dispatch:
  push:
    tags:
    - '*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and upload artifacts
    runs-on: ubuntu-latest
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Build sdist and wheel
      run: |
        python -m pip install --upgrade pip build
        python -m build

    - name: Upload release artifacts
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*

  docker:
    name: Push Docker image to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        cache-image: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the GitHub Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: docker_meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/kubedb/hanadb-exporter
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        push: true
        tags: ${{ steps.docker_meta.outputs.tags }}
        labels: ${{ steps.docker_meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        provenance: false

    - name: Extract metadata (tags, labels) for UBI image
      id: ubi_meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/kubedb/hanadb-exporter
        flavor: |
          latest=false
        tags: |
          type=semver,pattern={{version}}-ubi
          type=semver,pattern={{major}}.{{minor}}-ubi

    - name: Build and push UBI image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.ubi
        push: true
        tags: ${{ steps.ubi_meta.outputs.tags }}
        labels: ${{ steps.ubi_meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        provenance: false
