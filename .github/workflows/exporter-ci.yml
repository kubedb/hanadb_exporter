name: Exporter CI

# this workflow will
# - test the codebase on every pull request
# - commit to the OBS development upstream whenever the master branch is updated
# - perform an OBS Submit Request to downstream whenever a GitHub release is published

on:
  push:
    paths-ignore:
    - 'dashboards/**'
    - 'packaging/obs/grafana-sap-hana-dashboards/**'
    - '.github/workflows/dashboards*'
  pull_request:
    paths-ignore:
    - 'dashboards/**'
    - 'packaging/obs/grafana-sap-hana-dashboards/**'
    - '.github/workflows/dashboards*'
  release:
    types: [ published ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        python-version: [3.6, 3.8, 3.11]
    steps:
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - uses: actions/checkout@v4
    - name: install deps
      run: make deps
    - name: static analysis
      run: make static-checks
      continue-on-error: true
    - name: test
      run: make test

  image:
    needs: test
    runs-on: ubuntu-20.04
    if: ${{ github.event_name != 'pull_request' }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        cache-image: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/hanadb-exporter
        tags: |
          type=sha,format=long
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=tag

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  obs-commit:
    needs: test
    if: ${{ github.event_name != 'pull_request' }}
    concurrency: 
      group: obs
    runs-on: ubuntu-20.04
    container: shap/continuous_deliver
    env:
      OBS_USER: ${{ secrets.OBS_USER }}
      OBS_PASS: ${{ secrets.OBS_PASS }}
      OBS_PROJECT: ${{ vars.OBS_PROJECT }}
      REVISION: ${{ github.sha }}
      REPOSITORY: ${{ github.repository }}
      GITHUB_OAUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: configure OSC
      run: |
        /scripts/init_osc_creds.sh
        mkdir -p $HOME/.config/osc
        cp /root/.config/osc/oscrc $HOME/.config/osc
    - run: make exporter-obs-commit

  obs-submit-request:
    needs: test
    if: github.event.release
    concurrency:
      group: obs
    runs-on: ubuntu-20.04
    container: shap/continuous_deliver
    env:
      OBS_USER: ${{ secrets.OBS_USER }}
      OBS_PASS: ${{ secrets.OBS_PASS }}
      OBS_PROJECT: ${{ vars.OBS_PROJECT }}
      PACKAGE_NAME: prometheus-hanadb_exporter
      TARGET_PROJECT: ${{ vars.OBS_DOWNSTREAM_PROJECT }}
      REVISION: ${{ github.event.release.tag_name }}
      REPOSITORY: ${{ github.repository }}
      GITHUB_OAUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: configure OSC
      run: |
        /scripts/init_osc_creds.sh
        mkdir -p $HOME/.config/osc
        cp /root/.config/osc/oscrc $HOME/.config/osc
    - run: make exporter-obs-workdir
    - run: make exporter-obs-changelog
    - run: make exporter-obs-commit
    - run: /scripts/submit.sh
